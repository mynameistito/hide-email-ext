name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-lock-${{ hashFiles('bun.lock') }}
          restore-keys: bun-lock-

      - run: bun install --frozen-lockfile

      - run: bun run compile

      - run: bun run check
