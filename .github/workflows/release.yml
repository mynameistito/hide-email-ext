name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile

      - name: Check release eligibility
        id: release-check
        shell: bash
        run: |
          set -euo pipefail

          has_changesets=false
          shopt -s nullglob
          for file in .changeset/*.md; do
            case "$(basename "$file")" in
              README.md|RELEASE_NOTES.md) ;;
              *) has_changesets=true ;;
            esac
          done

          version_changed=false
          if git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:package.json" | node -e 'let input = ""; process.stdin.on("data", (chunk) => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input).version ?? ""));')"
            current_version="$(node -e 'const pkg = require("./package.json"); console.log(pkg.version ?? "")')"
            [[ "$previous_version" != "$current_version" ]] && version_changed=true
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            previous_version="$(git show HEAD^:package.json | node -e 'let input = ""; process.stdin.on("data", (chunk) => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input).version ?? ""));')"
            current_version="$(node -e 'const pkg = require("./package.json"); console.log(pkg.version ?? "")')"
            [[ "$previous_version" != "$current_version" ]] && version_changed=true
          fi

          if [[ "$has_changesets" == "true" || "$version_changed" == "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "has_changesets=$has_changesets"
          echo "version_changed=$version_changed"

      - name: Create Release Pull Request or Publish
        if: steps.release-check.outputs.should_run == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version
          publish: bun run ci:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTENSION_KEY_PEM: ${{ secrets.EXTENSION_KEY_PEM }}
          REQUIRE_CHROME_KEY: "1"
