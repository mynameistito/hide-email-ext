name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check release eligibility
        id: release-check
        shell: bash
        run: |
          set -euo pipefail

          has_changesets=false
          shopt -s nullglob
          for file in .changeset/*.md; do
            case "$(basename "$file")" in
              README.md|RELEASE_NOTES.md) ;;
              *) has_changesets=true ;;
            esac
          done

          version_changed=false
          version_unknown=false
          current_version=""
          previous_version=""

          read_version='const fs = require("node:fs"); try { const pkg = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (typeof pkg.version !== "string") process.exit(1); console.log(pkg.version); } catch { process.exit(1); }'
          read_stdin_version='let input = ""; process.stdin.setEncoding("utf8"); process.stdin.on("data", (chunk) => { input += chunk; }); process.stdin.on("end", () => { try { const pkg = JSON.parse(input); if (typeof pkg.version !== "string") process.exit(1); console.log(pkg.version); } catch { process.exit(1); } });'

          if ! current_version="$(node -e "$read_version" package.json)"; then
            version_unknown=true
          fi

          if git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            if ! previous_version="$(git show "${{ github.event.before }}:package.json" | node -e "$read_stdin_version")"; then
              version_unknown=true
            fi
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            if ! previous_version="$(git show HEAD^:package.json | node -e "$read_stdin_version")"; then
              version_unknown=true
            fi
          else
            version_unknown=true
          fi

          if [[ "$version_unknown" == "false" ]]; then
            [[ "$previous_version" != "$current_version" ]] && version_changed=true
          fi

          if [[ "$has_changesets" == "true" || "$version_changed" == "true" || "$version_unknown" == "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "has_changesets=$has_changesets"
          echo "version_changed=$version_changed"
          echo "version_unknown=$version_unknown"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.release-check.outputs.should_run == 'true'

      - run: bun install --frozen-lockfile
        if: steps.release-check.outputs.should_run == 'true'

      - name: Create Release Pull Request or Publish
        if: steps.release-check.outputs.should_run == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version
          publish: bun run ci:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTENSION_KEY_PEM: ${{ secrets.EXTENSION_KEY_PEM }}
          REQUIRE_CHROME_KEY: "1"
